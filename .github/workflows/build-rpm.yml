name: Build RPM Package

on:
  push:
    branches:
      - main
      - next
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - next
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y git rpm-build rpm-sign gnupg2 gcc-c++ systemd-devel curl findutils ca-certificates

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mark workspace directory as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build RPM package
        run: |
          ./build_rpm.sh

      - name: Import GPG Key
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        if: ${{ env.GPG_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign RPM Package
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        if: ${{ env.GPG_KEY != '' }}
        run: |
          # Configure RPM macros for signing
          echo "%_signature gpg" > ~/.rpmmacros
          echo "%_gpg_name E3F3D8805CCE6E3B" >> ~/.rpmmacros
          
          # Sign the built RPMs
          rpmsign --addsign rpmbuild/RPMS/x86_64/*.rpm

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-vpn-automation-rpm
          path: rpmbuild/RPMS/x86_64/*.rpm
