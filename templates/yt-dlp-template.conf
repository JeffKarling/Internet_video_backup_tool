# yt-dlp configuration template for instance: INSTANCE_NAME
# Copy this file to ~/yt-dlp-backup/conf/<instance_name>.conf and replace INSTANCE_NAME with your actual instance name.

--batch-file /var/lib/yt-dlp/conf/INSTANCE_NAME.batch.txt
--download-archive /var/lib/yt-dlp/conf/INSTANCE_NAME.history.txt
-o "/var/lib/yt-dlp/videos/%(uploader)s/%(upload_date)s - %(title)s - %(id)s.%(ext)s"

# Additional recommended options
-S "res:720,fps:30"
--no-playlist
--compat-options no-youtube-channel-redirect
--embed-metadata

# JavaScript Runtime for YouTube Signature Decryption
--js-runtimes node
